<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北京地铁 · 全网实时模拟</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <h1>北京地铁 · 实时模拟</h1>
  <div class="subtitle">数据来源：Beijing-Subway-Tools · 基于时刻表推算</div>
  <div class="time-display" id="clock">--:--<span class="sec">:--</span></div>
  <div class="date-display" id="dateDisp"></div>
  <div class="mode-label" id="modeLbl">实时模式</div>
  
  <div class="stat-grid">
    <div class="stat-box"><div class="val" id="lineCount">0</div><div class="lbl">线路</div></div>
    <div class="stat-box total"><div class="val" id="totalCount">0</div><div class="lbl">在线列车</div></div>
  </div>

  <div class="line-filter" id="lineFilter"></div>

  <div class="speed-ctrl" style="margin-bottom:6px">
    <label>时间</label>
    <input type="range" id="timeSlider" min="0" max="86400" value="0" step="1"/>
  </div>
  <div class="controls" style="margin-bottom:6px">
    <button id="btnPlay" style="background:rgba(99,102,241,0.2);color:#fff">⏸ 暂停</button>
    <button id="btnRT">自动流逝 (回到实时)</button>
  </div>
  <div class="speed-ctrl">
    <label style="min-width:auto">倍速</label>
    <select id="spdSelect" style="flex:1;background:rgba(255,255,255,0.06);color:#ccc;border:1px solid rgba(255,255,255,0.1);border-radius:4px;font-size:11px;padding:3px;outline:none;">
      <option value="1">1x (真实时间)</option>
      <option value="10">10x (微加速)</option>
      <option value="30">30x (半分钟/秒)</option>
      <option value="60">60x (1分钟/秒)</option>
      <option value="300">300x (5分钟/秒)</option>
    </select>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
